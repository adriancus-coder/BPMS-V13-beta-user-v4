<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPMS Display</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="display-body">
  <div class="display-shell">
    <div class="display-topbar">
      <div><span id="displayModeBadge" class="status-pill active">LIVE</span> <span id="displayEventName"></span></div>
      <div class="btn-row-wrap"><button id="displayLangBtn" class="btn-dark">Schimbă limba</button><button id="fullscreenBtn" class="btn-blue">Full screen</button></div>
    </div>
    <div class="display-stage">
      <div id="displayCurrent" class="display-current">Aștept conținut...</div>
      <div id="displayHistory" class="display-history"></div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/display.js"></script>
</body>
</html>
