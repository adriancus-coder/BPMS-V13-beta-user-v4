<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPMS Participant V2</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="participant-shell participant-shell-v2">
    <div class="participant-header panel glass-panel participant-hero-v2">
      <div class="eyebrow">BPMS Live Translate</div>
      <h1 id="participantEventName">Connecting...</h1>
      <div id="participantEventMeta" class="muted">Choose your language and follow the translation live.</div>
    </div>

    <div class="participant-controls panel glass-panel">
      <div>
        <label for="languageSelect">My language</label>
        <select id="languageSelect"></select>
      </div>
      <div class="button-row compact-row participant-audio-actions">
        <button id="playAudioBtn" class="btn btn-primary">Play audio</button>
        <button id="pauseAudioBtn" class="btn btn-dark">Pause audio</button>
      </div>
      <div>
        <div id="participantStatus" class="status-text">Connecting...</div>
      </div>
    </div>

    <div class="participant-live panel glass-panel">
      <div id="participantUpdatingBadge" class="updating-badge" style="display:none">Updating...</div>
      <div class="label">Live now</div>
      <div id="lastText" class="participant-main-text">Waiting for translation...</div>
      <div class="label history-label">Recent history</div>
      <div id="history" class="history-list"></div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/participant.js"></script>
</body>
</html>
