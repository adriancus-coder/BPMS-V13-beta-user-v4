<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPMS Participant</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <div class="container participant-wrap">
    <div class="panel hero-panel participant-hero">
      <div>
        <div class="eyebrow">BPMS Live Translate</div>
        <div class="header-logo">Participant</div>
        <div id="participantEventName" class="participant-event-name">Se conectează la eveniment...</div>
        <div id="participantEventMeta" class="participant-event-meta">Alege limba ta și urmărește traducerea live sau cântările.</div>
      </div>
    </div>
    <div class="panel participant-top-bar">
      <div class="participant-top-grid">
        <div class="participant-top-field"><label for="languageSelect">Limba mea</label><select id="languageSelect"></select></div>
        <div class="participant-top-actions"><button id="playAudioBtn" class="btn-green">Play audio</button><button id="pauseAudioBtn" class="btn-dark">Pause audio</button></div>
        <div class="participant-top-status"><div id="participantStatus" class="status">Conectare...</div></div>
      </div>
    </div>
    <div class="panel participant-live-with-history-panel">
      <div id="participantUpdatingBadge" class="participant-updating" style="display:none">Se actualizează...</div>
      <div class="small">Acum</div>
      <div id="lastText" class="last-highlight participant-live-only-text">Aștept traducerea...</div>
      <div class="small participant-history-title">Istoric recent</div>
      <div id="history" class="history participant-recent-history"></div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/participant.js"></script>
</body>
</html>
