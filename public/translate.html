<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPMS Translate Screen</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="display-body">
  <div class="display-single-wrap">
    <div class="display-single-top">
      <div class="participant-top-grid display-top-grid">
        <div class="participant-top-field">
          <label for="translateLanguage">Limba</label>
          <select id="translateLanguage"></select>
        </div>
        <div class="participant-top-actions">
          <button id="fullscreenBtn" class="btn btn-primary" type="button">Full screen</button>
        </div>
        <div class="participant-top-status">
          <div class="eyebrow">Main Screen</div>
          <div id="translateEventName" class="status">BPMS Translate</div>
          <div class="small">Mod: <span id="translateModeBadge">Auto</span> · Limbă: <span id="translateLanguageLabel">-</span></div>
          <div id="translateStatus" class="small">Conectare...</div>
        </div>
      </div>
    </div>

    <div id="translateTextWrap" class="display-single-panel">
      <div id="translateText" class="display-single-text">Aștept traducerea...</div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/translate.js"></script>
</body>
</html>
