<!doctype html>
<html lang="ro">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>BPMS Song Screen</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="display-body song-body">
  <main class="song-screen-wrap">
    <div class="song-screen-top">
      <div>
        <div class="eyebrow">Prepared Text Screen</div>
        <div id="songScreenTitle" class="song-screen-title">Song Screen</div>
      </div>
      <div class="display-controls display-controls-v2">
        <label class="display-select-label" for="songLanguageSelect">Language</label>
        <select id="songLanguageSelect"></select>
      </div>
    </div>
    <div class="song-stage">
      <div id="songOnlyTranslation" class="song-only-translation">Waiting for song translation...</div>
    </div>
  </main>
  <script src="/socket.io/socket.io.js"></script>
  <script src="/song.js"></script>
</body>
</html>
